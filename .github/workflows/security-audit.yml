name: Security Audit

on:
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 9 * * 3"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm run security:audit
