name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch naming convention
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|chore|docs|release|hotfix)\/[a-z0-9._-]+$ ]]; then
            echo "Branch name must match (feature|fix|chore|docs|release|hotfix)/<change>."
            exit 1
          fi

      - name: Validate PR title includes ticket reference
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^[A-Z][A-Z0-9]+-[0-9]+:\ .+ ]]; then
            echo "PR title must follow the format QA-1234: concise summary."
            exit 1
          fi

      - name: Validate PR description sections
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          missing=0

          for section in "## Change Summary" "## High-Level Validation" "## Change Area Checklist" "## Risk Review"; do
            if [[ "$PR_BODY" != *"$section"* ]]; then
              echo "Missing required section: $section"
              missing=1
            fi
          done

          if [[ ! "$PR_BODY" =~ Ticket:\ \`[A-Z][A-Z0-9]+-[0-9]+\` ]]; then
            echo "PR body must include a Ticket field like \`QA-1234\`."
            missing=1
          fi

          if [[ $missing -ne 0 ]]; then
            exit 1
          fi
