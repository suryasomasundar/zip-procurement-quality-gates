name: Deploy Smoke

# This workflow is intended for manually validating a deployed environment URL.
on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Target environment name
        required: true
        default: preview
      base_url:
        description: Fully qualified URL for the deployed application
        required: true
        default: https://example-preview.zip-takehome.dev

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed smoke tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url }}
          PLAYWRIGHT_SKIP_WEBSERVER: "1"
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-smoke-${{ inputs.environment_name }}
          path: |
            playwright-report
            test-results
