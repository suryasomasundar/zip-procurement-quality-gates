name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality-core:
    name: Quality Core
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Run API integration tests
        run: npm --workspace @zip-takehome/api run test:integration

      - name: Run web integration tests
        run: npm --workspace @zip-takehome/web run test:integration

      - name: Collect coverage
        run: npm run coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            apps/api/coverage
            apps/web/coverage
            packages/domain/coverage

  e2e-smoke-tests:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end smoke tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results

  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - quality-core
      - e2e-smoke-tests

    steps:
      - name: Confirm all quality jobs passed
        env:
          QUALITY_CORE_RESULT: ${{ needs.quality-core.result }}
          E2E_SMOKE_RESULT: ${{ needs.e2e-smoke-tests.result }}
        run: |
          if [[ "$QUALITY_CORE_RESULT" != "success" || "$E2E_SMOKE_RESULT" != "success" ]]; then
            echo "One or more CI quality stages failed."
            echo "quality-core=$QUALITY_CORE_RESULT"
            echo "e2e-smoke-tests=$E2E_SMOKE_RESULT"
            exit 1
          fi

          echo "All CI quality stages passed."
