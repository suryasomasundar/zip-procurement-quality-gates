name: Bug report
description: Report an application or workflow defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail for repro and triage.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to...
        2. Submit...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
