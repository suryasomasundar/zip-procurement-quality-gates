name: Incident report
description: Track a quality-gate, release, or deployment incident
title: "[Incident]: "
labels:
  - incident
body:
  - type: input
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      placeholder: Who was impacted and how?
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      placeholder: Detection, investigation, mitigation, resolution
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Root cause
    validations:
      required: true
  - type: textarea
    id: follow_up
    attributes:
      label: Follow-up actions
      placeholder: What needs to be fixed to prevent recurrence?
